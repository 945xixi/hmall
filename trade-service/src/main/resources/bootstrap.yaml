spring:
  application:
    name: trade-service # 服务名称
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: 192.168.203.135:8848  # 注意加上端口
      username: nacos
      password: nacos
      discovery:
        username: nacos
        password: nacos
      config:
        file-extension: yaml
        username: nacos
        password: nacos
        shared-configs:
          - dataId: shared-jdbc.yaml
          - dataId: shared-log.yaml
          - dataId: shared-swagger.yaml
          - dataId: shared-seata.yaml # 共享seata配置
